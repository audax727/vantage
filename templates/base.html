<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Vantage{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:ital,wght@0,300;0,400;0,700;1,300&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<!-- Apply saved theme instantly before paint to avoid flash -->
<script>
  (function () {
    var t = localStorage.getItem('vantage-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  }());
</script>
</head>
<body>

<div id="cursor"></div>
<div class="shell">
  <!-- ── THEME TOGGLE (TOP RIGHT) ────────────────────────── -->
  <button
    class="skiper-theme-btn"
    id="themeToggleBtn"
    onclick="vantageToggleTheme()"
    aria-label="Toggle theme"
  >
    <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" fill="currentColor" stroke-linecap="round" viewBox="0 0 32 32">
      <clipPath id="skiper-btn-clip">
        <path class="skiper-moon-mask" d="M0-5h30a1 1 0 0 0 9 13v24H0Z" />
      </clipPath>
      <g clip-path="url(#skiper-btn-clip)">
        <circle class="skiper-sun-core" cx="16" cy="16" r="8" />
        <g class="skiper-sun-rays" stroke="currentColor" stroke-width="1.5">
          <path d="M16 5.5v-4" />
          <path d="M16 30.5v-4" />
          <path d="M1.5 16h4" />
          <path d="M26.5 16h4" />
          <path d="m23.4 8.6 2.8-2.8" />
          <path d="m5.7 26.3 2.9-2.9" />
          <path d="m5.8 5.8 2.8 2.8" />
          <path d="m23.4 23.4 2.9 2.9" />
        </g>
      </g>
    </svg>
  </button>
  <!-- ─── HAMBURGER (mobile) ─────────────────────────── -->
  <button class="hamburger" id="hamburgerBtn" aria-label="Open menu">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <!-- ─── SIDEBAR ──────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <span class="brand-name">Vantage</span>
    </div>

    <nav class="nav">
      <a href="{{ url_for('dashboard') }}"
         class="nav-item {{ 'active' if section=='dashboard' }}">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="{{ url_for('products_page') }}"
         class="nav-item {{ 'active' if section=='products' }}">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Inventory
      </a>
      <a href="{{ url_for('sales_page') }}"
         class="nav-item {{ 'active' if section=='sales' }}">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Record Sale
      </a>
      <a href="{{ url_for('ledger_page') }}"
         class="nav-item {{ 'active' if section=='ledger' }}">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Ledger
      </a>
      <a href="{{ url_for('analytics_page') }}"
         class="nav-item {{ 'active' if section=='analytics' }}">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Analytics
      </a>
    </nav>


    <div class="sidebar-footer">
      {% if user %}
      <div class="shop-tag">{{ user['shop_name'] }}</div>
      <a href="{{ url_for('logout') }}" class="logout-link">Sign out →</a>
      {% endif %}
    </div>
  </aside>

  <!-- ─── MAIN ─────────────────────────────────────────── -->
  <main class="content">
    {% block content %}{% endblock %}
  </main>
</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

<!-- ─── SCROLL REVEAL ─────────────────────────────────────── -->
<script>
(function () {
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) {
        e.target.classList.add('r-visible');
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -32px 0px' });

  function init() {
    document.querySelectorAll('[data-reveal]').forEach(function(el) {
      var r = el.getBoundingClientRect();
      if (r.top < window.innerHeight * 0.95) {
        el.classList.add('r-visible');
      } else {
        obs.observe(el);
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
}());
</script>

<!-- ─── SKIPER26 THEME TOGGLE ENGINE ─────────────────────── -->
<script>
/**
 * Theme Toggle — inspired by skiper26.tsx
 * Uses View Transitions API (document.startViewTransition) for animated
 * circle-expand transition from the top-right corner of the screen.
 * Falls back to instant swap on browsers without VT support.
 */
(function () {
  var HTML  = document.documentElement;
  var BTN   = document.getElementById('themeToggleBtn');
  var LABEL = document.getElementById('themeToggleLabel');

  /* ── Read saved preference ──────────────────────────── */
  var current = localStorage.getItem('vantage-theme') || 'dark';
  applyTheme(current, false);

  /* ── The transition CSS (skiper26 rectangle bottom-up) ─ */
  function injectTransitionCSS(toTheme) {
    var styleId = 'vantage-vt-styles';
    var el = document.getElementById(styleId);
    if (!el) {
      el = document.createElement('style');
      el.id = styleId;
      document.head.appendChild(el);
    }

    /* Circle expands from top-right corner of the viewport */
    el.textContent = [
      '::view-transition-group(root) {',
      '  animation-duration: 0.75s;',
      '  animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);',
      '}',
      '::view-transition-new(root) {',
      '  animation-name: vt-circle-in;',
      '}',
      '::view-transition-old(root) {',
      '  animation: none;',
      '  z-index: -1;',
      '}',
      '@keyframes vt-circle-in {',
      '  from { clip-path: circle(0% at calc(100% - 32px) 32px); }',
      '  to   { clip-path: circle(150% at calc(100% - 32px) 32px); }',
      '}'
    ].join('\n');
  }

  /* ── Core toggle ────────────────────────────────────── */
  window.vantageToggleTheme = function () {
    var next = (current === 'dark') ? 'light' : 'dark';

    injectTransitionCSS(next);

    if (!document.startViewTransition) {
      /* No VT support — just swap instantly */
      applyTheme(next, true);
      return;
    }

    document.startViewTransition(function () {
      applyTheme(next, true);
    });
  };

  /* ── Apply theme to DOM + persist ───────────────────── */
  function applyTheme(theme, save) {
    current = theme;
    HTML.setAttribute('data-theme', theme);
    if (save) localStorage.setItem('vantage-theme', theme);

    /* Update button label */
    if (LABEL) {
      LABEL.textContent = (theme === 'dark') ? 'Light mode' : 'Dark mode';
    }
  }
}());
</script>

<!-- ─── SKIPER58 NAV ANIMATION ──────────────────────────── -->
<script>
(function() {
  function initNavRoll() {
    document.querySelectorAll('.nav-item').forEach(function(item) {
      if (item.querySelector('.nav-text-roll')) return; // already init
      
      var textNode = null;
      for (var i = 0; i < item.childNodes.length; i++) {
        var node = item.childNodes[i];
        if (node.nodeType === Node.TEXT_NODE && node.textContent.trim().length > 0) {
          textNode = node;
          break;
        }
      }
      
      if (!textNode) return;
      var text = textNode.textContent.trim();
      textNode.textContent = ' ';
      
      var rollContainer = document.createElement('span');
      rollContainer.className = 'nav-text-roll';
      
      var topWrapper = document.createElement('span');
      topWrapper.className = 'roll-top';
      
      var bottomWrapper = document.createElement('span');
      bottomWrapper.className = 'roll-bottom';
      
      var chars = text.split('');
      var STAGGER = 0.035;
      
      chars.forEach(function(char, index) {
        var delay = STAGGER * Math.abs(index - (chars.length - 1) / 2);
        
        var span1 = document.createElement('span');
        span1.className = 'roll-char';
        span1.textContent = char === ' ' ? '\u00A0' : char;
        span1.style.transitionDelay = delay + 's';
        topWrapper.appendChild(span1);
        
        var span2 = document.createElement('span');
        span2.className = 'roll-char';
        span2.textContent = char === ' ' ? '\u00A0' : char;
        span2.style.transitionDelay = delay + 's';
        bottomWrapper.appendChild(span2);
      });
      
      rollContainer.appendChild(topWrapper);
      rollContainer.appendChild(bottomWrapper);
      item.appendChild(rollContainer);
    });
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initNavRoll);
  } else {
    initNavRoll();
  }
})();
</script>

<!-- ─── MOBILE SIDEBAR TOGGLE ─────────────────────────── -->
<script>
(function() {
  var btn     = document.getElementById('hamburgerBtn');
  var sidebar = document.getElementById('sidebar');
  var overlay = document.getElementById('sidebarOverlay');

  function openSidebar() {
    sidebar.classList.add('open');
    overlay.classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeSidebar() {
    sidebar.classList.remove('open');
    overlay.classList.remove('show');
    document.body.style.overflow = '';
  }

  if (btn) btn.addEventListener('click', openSidebar);
  if (overlay) overlay.addEventListener('click', closeSidebar);

  /* Close sidebar when a nav link is clicked on mobile */
  document.querySelectorAll('.nav-item').forEach(function(link) {
    link.addEventListener('click', closeSidebar);
  });
})();
</script>

{% block scripts %}{% endblock %}
</body>
</html>
