{% extends "base.html" %}
{% block title %}Ledger — Vantage{% endblock %}
{% block content %}
<style>
  /* Ledger-specific badge overrides */
  .badge-paid,
  .badge-settled {
    background: #393939;
    color: #d4d2d2;
    border: 1px solid #393939;
  }

  .badge-partial,
  .badge-credit {
    background: transparent;
    color: #fe1e34;
    border-color: #fe1e34;
  }

  .badge-open {
    background: transparent;
    color: #10b981;
    border-color: #10b981;
  }
</style>

<div class="page-header" style="display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:12px;">
  <div>
    <div class="page-eyebrow">Credit &amp; Dues</div>
    <h1 class="page-title">Ledger</h1>
    <p class="page-subtitle">Every unpaid or partially paid sale lands here automatically.</p>
  </div>
  <button class="btn btn-outline" onclick="sendBatchReminders()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="margin-right:6px;"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
    Send Batch Reminders
  </button>
</div>

<div class="table-wrap">
<table>
  <thead>
    <tr><th>Customer</th><th>Due date</th><th>Amount due</th><th>Paid so far</th><th>Status</th><th></th></tr>
  </thead>
  <tbody id="ledgerRows"></tbody>
</table>
</div>

<div class="modal-backdrop" id="collectModal">
  <div class="modal">
    <h3>Collect payment</h3>
    <form id="collectForm">
      <input type="hidden" name="entry_id">
      <div class="field"><label>Amount received</label><input name="amount" type="number" step="0.01" required></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="document.getElementById('collectModal').classList.remove('show')">Cancel</button>
        <button type="submit" class="btn btn-primary">Record payment</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadLedger() {
  const entries = await api('/api/ledger');
  const rows = document.getElementById('ledgerRows');
  if (!entries.length) {
    rows.innerHTML = `<tr><td colspan="6"><div class="empty-state">No outstanding dues. Everyone's paid up.</div></td></tr>`;
    return;
  }
  rows.innerHTML = entries.map(e => `
    <tr>
      <td>${e.customer_name}</td>
      <td>${new Date(e.date).toLocaleDateString()}</td>
      <td class="num">₹${e.amount_due.toFixed(2)}</td>
      <td class="num">₹${e.amount_paid.toFixed(2)}</td>
      <td><span class="badge badge-${e.status}">${e.status}</span></td>
      <td style="display: flex; gap: 8px;">
        <button class="btn btn-outline btn-sm" onclick="openCollect(${e.id})">Collect</button>
        <a href="/api/ledger/${e.customer_id}/statement" target="_blank" class="btn btn-outline btn-sm">Statement</a>
      </td>
    </tr>
  `).join('');
}

function openCollect(id) {
  document.querySelector('#collectForm [name=entry_id]').value = id;
  document.getElementById('collectModal').classList.add('show');
}

document.getElementById('collectForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const id = fd.get('entry_id');
  try {
    await api(`/api/ledger/${id}/collect`, { method: 'POST', body: { amount: parseFloat(fd.get('amount')) } });
    document.getElementById('collectModal').classList.remove('show');
    toast('Payment recorded');
    loadLedger();
  } catch (err) { toast(err.message); }
});

async function sendBatchReminders() {
  if (!confirm("Send reminders for all dues over 30 days old?")) return;
  try {
    const res = await api('/api/ledger/batch-remind', { method: 'POST' });
    toast(`Sent ${res.count} reminders`);
  } catch(err) { toast(err.message); }
}

loadLedger();
</script>
{% endblock %}
